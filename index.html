<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ny Tools</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Kantumruy Pro', sans-serif; background: #fdfaf7; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 450px; }
        
        /* Home Page Grid */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .icon-card { background: white; border-radius: 20px; padding: 15px 5px; text-align: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .icon-card img { width: 40px; margin-bottom: 8px; }
        .icon-card span { display: block; font-size: 11px; font-weight: bold; color: #333; }

        /* Tools Page Area */
        .page { display: none; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .active { display: block; }
        .back-btn { color: #7a5af5; cursor: pointer; font-weight: bold; margin-bottom: 20px; display: inline-block; }

        /* Input & Buttons */
        textarea, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 15px; font-family: inherit; }
        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-purple { background: #7a5af5; }
        .btn-red { background: white; color: #ff4d4d; border: 2px solid #ff4d4d; margin-top: 10px; }
        
        .preview-img { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .preview-img img { width: 100%; height: 80px; object-fit: cover; border-radius: 10px; }
    </style>
</head>
<body>
<div class="app">
    <div id="home" class="page active">
        <div class="grid">
            <div class="icon-card" onclick="showPage('tts')">
                <img src="https://cdn-icons-png.flaticon.com/512/3039/3039433.png">
                <span>អត្ថបទទៅសំឡេង</span>
            </div>
            <div class="icon-card" onclick="showPage('pdf')">
                <img src="https://cdn-icons-png.flaticon.com/512/337/337946.png">
                <span>រូបភាពទៅ PDF</span>
            </div>
        </div>
    </div>

    <div id="tts" class="page">
        <span class="back-btn" onclick="showPage('home')">← ត្រឡប់ក្រោយ</span>
        <h2>អត្ថបទទៅសំឡេង</h2>
        <select id="lang"><option value="km">ខ្មែរ</option><option value="en">អង់គ្លេស</option></select>
        <select id="gender"><option value="female">សំឡេងស្រី</option><option value="male">សំឡេងប្រុស</option></select>
        <textarea id="text" rows="5" placeholder="វាយអត្ថបទទីនេះ..."></textarea>
        <button class="btn btn-purple" onclick="doTTS()">ស្តាប់សំឡេង</button>
    </div>

    <div id="pdf" class="page">
        <span class="back-btn" onclick="showPage('home')">← ត្រឡប់ក្រោយ</span>
        <h2>រូបភាពទៅ PDF</h2>
        <input type="file" id="files" multiple accept="image/*" onchange="previewImages()" style="margin-bottom: 15px;">
        <div id="preview" class="preview-img"></div>
        <button class="btn btn-purple" style="margin-top: 15px;" onclick="makePDF()">ទាញយក PDF</button>
        <button class="btn btn-red" onclick="location.reload()">សម្អាតទាំងអស់</button>
    </div>
</div>

<script>
    const API = "https://nytool.onrender.com"; // កែតាម URL របស់អ្នក
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function doTTS() {
        const text = document.getElementById('text').value;
        const res = await fetch(`${API}/api/tts`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ text, lang: document.getElementById('lang').value, gender: document.getElementById('gender').value })
        });
        const data = await res.json();
        if(data.url) new Audio(API + data.url).play();
    }

    let imgList = [];
    function previewImages() {
        const p = document.getElementById('preview'); p.innerHTML = "";
        imgList = Array.from(document.getElementById('files').files);
        imgList.forEach(f => {
            const reader = new FileReader();
            reader.onload = (e) => { p.innerHTML += `<img src="${e.target.result}">`; };
            reader.readAsDataURL(f);
        });
    }

    async function makePDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        for(let i=0; i<imgList.length; i++) {
            if(i > 0) doc.addPage();
            const data = await new Promise(r => { const rd = new FileReader(); rd.onload=()=>r(rd.result); rd.readAsDataURL(imgList[i]); });
            doc.addImage(data, 'JPEG', 0, 0, 210, 297);
        }
        doc.save("nytools.pdf");
    }
</script>
</body>
</html>
