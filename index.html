<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imsela - Pro Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007bff; --purple: #6f42c1; --bg: #fdfaf7; }
        body { background: var(--bg); font-family: 'Kantumruy Pro', sans-serif; margin: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; padding: 20px; box-sizing: border-box; }
        .page { display: none; } .page.active { display: block; }
        .bot-badge { background: var(--primary); color: white; border-radius: 50px; padding: 8px 20px; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 20px; }
        select, textarea { width: 100%; padding: 15px; border-radius: 50px; border: 1px solid #eee; margin-bottom: 12px; outline: none; font-family: inherit; font-size: 16px; box-sizing: border-box; }
        textarea { border-radius: 20px; height: 120px; resize: none; }
        .btn-main { background: var(--primary); color: white; width: 100%; padding: 18px; border-radius: 50px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; }
        .preview-box { background: var(--purple); color: white; border-radius: 25px; padding: 20px; margin: 25px 0; display: none; align-items: center; gap: 15px; }
        .play-btn { background: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; color: #ff9800; font-size: 20px; }
        .download-btn { border: 2px solid #333; background: white; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="home" class="page active">
        <h1 onclick="showPage('tts')" style="cursor:pointer; background:white; padding:30px; border-radius:20px; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.05);">🎤 Tool: អត្ថបទទៅសម្លេង</h1>
    </div>

    <div id="tts" class="page">
        <div onclick="showPage('home')" style="cursor:pointer; color:#888; margin-bottom:15px;">← ត្រឡប់</div>
        <h2>អត្ថបទទៅសម្លេង (TTS)</h2>
        <div class="bot-badge">🤖 Bot AI (Neural)</div>

        <select id="lang">
            <option value="km">ភាសា: ខ្មែរ</option>
            <option value="en">Language: English</option>
            <option value="th">Language: Thai</option>
            <option value="zh">Chinese</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="vi">Vietnamese</option>
            <option value="ar">Arabic</option>
            <option value="fr">French</option>
        </select>

        <select id="gender">
            <option value="male" selected>ភេទ: ប្រុស (លោក ពិសិដ្ឋ)</option>
            <option value="female">ភេទ: ស្រី (កញ្ញា ស្រីមុំ)</option>
        </select>

        <textarea id="textInput" placeholder="វាយអត្ថបទនៅទីនេះ..."></textarea>
        <button class="btn-main" onclick="generateTTS()">🎤 បង្កើតសម្លេង AI</button>

        <div id="previewBox" class="preview-box">
            <button class="play-btn" onclick="playAudio()">▶</button>
            <span style="font-size:14px;">កំពុងត្រៀមសម្លេង...</span>
        </div>
        <button id="dlBtn" class="download-btn" style="display:none;" onclick="downloadMP3()">ទាញយក MP3</button>
    </div>
</div>

<script>
    let audioUrl = "";
    const API = "https://nytool.onrender.com/api/tts";

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function generateTTS() {
        const text = document.getElementById('textInput').value;
        const lang = document.getElementById('lang').value;
        const gender = document.getElementById('gender').value;
        const btn = document.querySelector('.btn-main');

        if(!text) return alert("សូមបញ្ចូលអត្ថបទ");
        btn.innerText = "⏳ កំពុងបង្កើត..."; btn.disabled = true;

        try {
            const res = await fetch(API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text, lang, gender })
            });
            const data = await res.json();
            if(data.audioUrl) {
                audioUrl = data.audioUrl;
                document.getElementById('previewBox').style.display = 'flex';
                document.getElementById('dlBtn').style.display = 'block';
            }
        } catch (e) { alert("Error connecting to server!"); }
        btn.innerText = "🎤 បង្កើតសម្លេង AI"; btn.disabled = false;
    }

    function playAudio() { if(audioUrl) new Audio(audioUrl).play(); }
    function downloadMP3() { if(audioUrl) window.open(audioUrl, '_blank'); }
</script>
</body>
</html>
