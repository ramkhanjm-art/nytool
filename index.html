<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ny Tools - Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #0b0e14; color: #ecf0f1; font-family: 'Segoe UI', sans-serif; }
        
        /* Sidebar */
        .sidebar { width: 240px; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px; font-size: 22px; font-weight: bold; color: #7a5af5; border-bottom: 1px solid #30363d; }
        .nav-item { padding: 15px 30px; cursor: pointer; color: #8b949e; transition: 0.3s; font-size: 16px; }
        .nav-item:hover, .nav-item.active { background: #1f2937; color: #7a5af5; border-left: 4px solid #7a5af5; }

        /* Content Area */
        .content { flex: 1; padding: 40px; overflow-y: auto; }
        .page { display: none; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: #0d1117; border: 1px solid #30363d; border-radius: 12px; padding: 30px; max-width: 700px; }
        h2 { margin-top: 0; color: #f0f6fc; }

        /* Form Elements */
        textarea, select { width: 100%; padding: 12px; background: #161b22; border: 1px solid #30363d; color: #c9d1d9; border-radius: 8px; margin-bottom: 20px; font-size: 15px; }
        .btn { padding: 14px 28px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.2s; }
        .btn-primary { background: #7a5af5; color: white; width: 100%; }
        .btn-primary:hover { background: #6344d4; }
        .btn-outline { background: transparent; border: 1px solid #f85149; color: #f85149; width: 100%; margin-top: 10px; }

        /* PDF Preview */
        .upload-zone { border: 2px dashed #30363d; border-radius: 15px; padding: 50px; text-align: center; cursor: pointer; background: #161b22; margin-bottom: 20px; }
        .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; }
        .preview-item img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; border: 1px solid #30363d; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">NY TOOLS</div>
        <div class="nav-item active" onclick="switchPage('tts-page', this)">🔊 TTS (Voice)</div>
        <div class="nav-item" onclick="switchPage('pdf-page', this)">📄 Image to PDF</div>
    </div>

    <div class="content">
        <div id="tts-page" class="page active">
            <div class="card">
                <h2>Text to Speech</h2>
                <label>ជ្រើសរើសភាសា:</label>
                <select id="langSel">
                    <option value="km">Khmer (ខ្មែរ)</option>
                    <option value="en" selected>English</option>
                    <option value="th">Thai</option>
                    <option value="zh-CN">Chinese</option>
                    </select>

                <label>ជ្រើសរើសសំឡេង:</label>
                <select id="genderSel">
                    <option value="female">ស្រី (Female)</option>
                    <option value="male">ប្រុស (Male)</option>
                </select>

                <textarea id="textIn" rows="5" placeholder="បញ្ចូលអត្ថបទនៅទីនេះ..."></textarea>
                <button class="btn btn-primary" onclick="generateVoice()">បង្កើតសំឡេង</button>
            </div>
        </div>

        <div id="pdf-page" class="page">
            <div class="card">
                <h2>Image to PDF</h2>
                <div class="upload-zone" onclick="document.getElementById('imgIn').click()">
                    <p>ចុចទីនេះដើម្បីបញ្ចូលរូបភាព</p>
                    <input type="file" id="imgIn" multiple style="display:none" onchange="handleFiles(this.files)">
                </div>
                <div id="preview" class="preview-grid"></div>
                <button class="btn btn-primary" style="margin-top: 20px;" onclick="convertPDF()">បំប្លែងទៅ PDF</button>
                <button class="btn btn-outline" onclick="clearAll()">សម្អាតទាំងអស់</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://nytool.onrender.com";
        let files = [];

        function switchPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            element.classList.add('active');
        }

        async function generateVoice() {
            const text = document.getElementById('textIn').value;
            if(!text) return alert("សូមបញ្ចូលអត្ថបទ");
            const res = await fetch(`${API_URL}/api/tts`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    text,
                    lang: document.getElementById('langSel').value,
                    gender: document.getElementById('genderSel').value
                })
            });
            const data = await res.json();
            if(data.audioUrl) new Audio(API_URL + data.audioUrl).play();
        }

        function handleFiles(fs) {
            files = [...files, ...Array.from(fs)];
            const p = document.getElementById('preview');
            p.innerHTML = "";
            files.forEach((f, i) => {
                const rd = new FileReader();
                rd.onload = (e) => {
                    const img = document.createElement('div');
                    img.className = 'preview-item';
                    img.innerHTML = `<img src="${e.target.result}">`;
                    p.appendChild(img);
                };
                rd.readAsDataURL(f);
            });
        }

        async function convertPDF() {
            if(!files.length) return;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            for(let i=0; i<files.length; i++) {
                if(i > 0) doc.addPage();
                const data = await new Promise(r => { const rd = new FileReader(); rd.onload=()=>r(rd.result); rd.readAsDataURL(files[i]); });
                doc.addImage(data, 'JPEG', 0, 0, 210, 297);
            }
            doc.save("Ny-Tools.pdf");
        }

        function clearAll() { files = []; document.getElementById('preview').innerHTML = ""; }
    </script>
</body>
</html>
