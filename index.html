<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ny Tools - 21 Languages</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --purple: #7a5af5; --red: #ff4d4d; --blue: #007bff; }
        body { font-family: 'Kantumruy Pro', sans-serif; background: #fdfaf7; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; padding: 15px; }
        
        /* PDF UI Style */
        .upload-area { border: 2px dashed #ccc; border-radius: 25px; padding: 30px; text-align: center; background: white; cursor: pointer; margin-top: 20px; }
        .upload-area img { width: 70px; margin-bottom: 10px; }
        .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .preview-item { position: relative; height: 100px; border-radius: 12px; overflow: hidden; border: 1px solid #eee; }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        
        /* TTS UI */
        select, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 10px; font-family: inherit; box-sizing: border-box; }
        .gender-select { display: flex; gap: 10px; margin-bottom: 15px; }
        .gender-btn { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 10px; background: white; cursor: pointer; text-align: center; }
        .gender-btn.active { border-color: var(--blue); background: #e7f3ff; color: var(--blue); }

        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
        .btn-purple { background: linear-gradient(to right, #7a5af5, #9d7cfd); color: white; }
        .btn-red { background: white; color: var(--red); border: 2px solid var(--red); }
    </style>
</head>
<body>
    <div class="container">
        <h3 style="color: var(--blue);">Text to Speech (21 Languages)</h3>
        <select id="langSel">
            <option value="km">Khmer (ខ្មែរ)</option><option value="en">English</option>
            <option value="zh-CN">Chinese</option><option value="ja">Japanese</option>
            <option value="ko">Korean</option><option value="th">Thai</option>
            <option value="vi">Vietnamese</option><option value="lo">Lao</option>
            <option value="my">Myanmar</option><option value="tl">Filipino</option>
            <option value="ms">Malay</option><option value="id">Indonesian</option>
            <option value="bn">Bengali</option><option value="hi">Hindi</option>
            <option value="ar">Arabic</option><option value="pt">Portuguese</option>
            <option value="fr">French</option><option value="de">German</option>
            <option value="es">Spanish</option><option value="ru">Russian</option>
            <option value="it">Italian</option>
        </select>
        
        <div class="gender-select">
            <div class="gender-btn active" id="fBtn" onclick="setGender('female')">ស្រី (Female)</div>
            <div class="gender-btn" id="mBtn" onclick="setGender('male')">ប្រុស (Male)</div>
        </div>

        <textarea id="textIn" rows="4" placeholder="វាយអត្ថបទនៅទីនេះ..."></textarea>
        <button class="btn btn-purple" onclick="doTTS()" id="ttsBtn">បង្កើតសំឡេង</button>

        <hr>

        <div class="upload-area" onclick="document.getElementById('imgIn').click()">
            <img src="https://cdn-icons-png.flaticon.com/512/685/685655.png">
            <p>ចុចដើម្បីបញ្ចូលរូបភាព</p>
            <input type="file" id="imgIn" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files)">
        </div>
        <div id="preview" class="preview-grid"></div>
        <button class="btn btn-purple" onclick="generatePDF()">📄 បំប្លែងទៅ PDF</button>
        <button class="btn btn-red" onclick="clearPDF()">🗑️ សម្អាតទាំងអស់</button>
    </div>

    <script>
        let currentGender = 'female';
        let files = [];
        const API = "https://nytool.onrender.com"; // កែតាម URL របស់អ្នក

        function setGender(g) {
            currentGender = g;
            document.getElementById('fBtn').classList.toggle('active', g === 'female');
            document.getElementById('mBtn').classList.toggle('active', g === 'male');
        }

        async function doTTS() {
            const text = document.getElementById('textIn').value;
            if(!text) return;
            const btn = document.getElementById('ttsBtn');
            btn.innerText = "កំពុងបង្កើត...";
            const res = await fetch(`${API}/api/tts`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text, lang: document.getElementById('langSel').value, gender: currentGender })
            });
            const data = await res.json();
            if(data.audioUrl) new Audio(API + data.audioUrl).play();
            btn.innerText = "បង្កើតសំឡេង";
        }

        function handleFiles(fs) { files = [...files, ...Array.from(fs)]; renderPreview(); }
        function renderPreview() {
            const p = document.getElementById('preview'); p.innerHTML = "";
            files.forEach((f, i) => {
                const rd = new FileReader();
                rd.onload = (e) => {
                    const d = document.createElement('div'); d.className = 'preview-item';
                    d.innerHTML = `<img src="${e.target.result}"><button onclick="files.splice(${i},1);renderPreview();" style="position:absolute;top:2px;right:2px;background:red;color:white;border:none;border-radius:50%;cursor:pointer;">✕</button>`;
                    p.appendChild(d);
                };
                rd.readAsDataURL(f);
            });
        }
        async function generatePDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            for(let i=0; i<files.length; i++) {
                if(i > 0) doc.addPage();
                const data = await new Promise(r => { const rd = new FileReader(); rd.onload=()=>r(rd.result); rd.readAsDataURL(files[i]); });
                doc.addImage(data, 'JPEG', 0, 0, 210, 297);
            }
            doc.save("Ny-Tools.pdf");
        }
        function clearPDF() { files = []; renderPreview(); }
    </script>
</body>
</html>
