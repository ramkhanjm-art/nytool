<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ny Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #7a5af5; --danger: #ff4d4d; --bg: #fdfaf7; }
        body { font-family: 'Kantumruy Pro', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; padding: 20px; box-sizing: border-box; }
        
        /* PDF Upload Area */
        .upload-card { border: 2px dashed #ccc; border-radius: 25px; padding: 40px 20px; text-align: center; background: white; cursor: pointer; margin-bottom: 20px; }
        .upload-card img { width: 80px; margin-bottom: 10px; }
        .upload-card h3 { font-size: 18px; margin: 10px 0; }
        .upload-card p { font-size: 14px; color: #888; margin: 0; }

        .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .preview-item { position: relative; height: 100px; border-radius: 15px; overflow: hidden; border: 1px solid #ddd; }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .remove-btn { position: absolute; top: 5px; right: 5px; background: var(--danger); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; }

        /* Buttons */
        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; transition: 0.3s; }
        .btn-purple { background: linear-gradient(to right, #7a5af5, #9d7cfd); color: white; }
        .btn-outline { background: white; color: var(--danger); border: 2px solid var(--danger); }
        
        /* TTS Layout */
        select, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 15px; font-family: inherit; box-sizing: border-box; }
        .gender-box { display: flex; gap: 10px; margin-bottom: 15px; }
        .gender-opt { flex: 1; background: white; padding: 10px; border-radius: 10px; border: 1px solid #ddd; text-align: center; cursor: pointer; }
        .gender-opt.active { border-color: #007bff; background: #e7f3ff; }
    </style>
</head>
<body>
    <div class="app-container">
        <select id="langSel">
            <option value="km">ខ្មែរ (Khmer)</option>
            <option value="en" selected>English</option>
            </select>
        <div class="gender-box">
            <div class="gender-opt active" id="fBtn" onclick="setGender('female')">ស្រី (Female)</div>
            <div class="gender-opt" id="mBtn" onclick="setGender('male')">ប្រុស (Male)</div>
        </div>
        <textarea id="textIn" rows="4" placeholder="វាយអត្ថបទនៅទីនេះ..."></textarea>
        <button class="btn btn-purple" onclick="doTTS()">បង្កើតសំឡេង</button>

        <hr style="margin: 25px 0; border: 0; border-top: 1px solid #ddd;">

        <div class="upload-card" onclick="document.getElementById('imgIn').click()">
            <img src="https://cdn-icons-png.flaticon.com/512/685/685655.png">
            <h3>ចុច ឬអូសរូបភាពមកទីនេះ</h3>
            <p>គាំទ្រ: JPG, PNG, WEBP • អាចជ្រើសរើសបានច្រើន</p>
            <input type="file" id="imgIn" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files)">
        </div>

        <div id="preview" class="preview-grid"></div>

        <button class="btn btn-purple" onclick="generatePDF()">📄 បំប្លែងទៅ PDF</button>
        <button class="btn btn-outline" onclick="clearAll()">🗑️ សម្អាតទាំងអស់</button>
    </div>

    <script>
        const API = "https://nytool.onrender.com"; //
        let currentGender = 'female';
        let files = [];

        function setGender(g) {
            currentGender = g;
            document.getElementById('fBtn').classList.toggle('active', g === 'female');
            document.getElementById('mBtn').classList.toggle('active', g === 'male');
        }

        async function doTTS() {
            const text = document.getElementById('textIn').value.trim();
            if(!text) return;
            try {
                const res = await fetch(`${API}/api/tts`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ text, lang: document.getElementById('langSel').value, gender: currentGender })
                });
                const data = await res.json();
                if(data.audioUrl) new Audio(API + data.audioUrl).play();
            } catch(e) { alert("Error connecting to server!"); }
        }

        function handleFiles(fs) { files = [...files, ...Array.from(fs)]; renderPreview(); }
        function renderPreview() {
            const p = document.getElementById('preview'); p.innerHTML = "";
            files.forEach((f, i) => {
                const rd = new FileReader();
                rd.onload = (e) => {
                    const d = document.createElement('div'); d.className = 'preview-item';
                    d.innerHTML = `<img src="${e.target.result}"><button class="remove-btn" onclick="files.splice(${i},1);renderPreview();">✕</button>`;
                    p.appendChild(d);
                };
                rd.readAsDataURL(f);
            });
        }

        async function generatePDF() {
            if(!files.length) return;
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            for(let i=0; i<files.length; i++) {
                if(i > 0) doc.addPage();
                const data = await new Promise(r => { const rd = new FileReader(); rd.onload=()=>r(rd.result); rd.readAsDataURL(files[i]); });
                doc.addImage(data, 'JPEG', 0, 0, 210, 297);
            }
            doc.save("Ny-Tools.pdf");
        }
        function clearAll() { files = []; renderPreview(); }
    </script>
</body>
</html>
